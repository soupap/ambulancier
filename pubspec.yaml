name: incident_reporter
description: "Ambulancier mobile app for EMS dispatch, routing, and driver coordination."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_appauth: ^8.0.3
  geolocator: ^11.1.0
  http: ^1.2.0
  jwt_decoder: ^2.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  stomp_dart_client: ^2.1.3
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
